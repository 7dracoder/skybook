{% extends "base.html" %}
{% block title %}SkyBook, Error{% endblock %}
{% block content %}
<div class="empty">
  <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.4" style="color:var(--err)">
    <circle cx="12" cy="12" r="10"/>
    <line x1="12" y1="8" x2="12" y2="12"/>
    <line x1="12" y1="16" x2="12.01" y2="16"/>
  </svg>
  <h3>Something went wrong</h3>
  <p style="font-family:monospace;font-size:.78rem;background:var(--off);padding:.75rem 1rem;
            border-radius:var(--r-md);max-width:60ch;word-break:break-all;text-align:left">{{ message }}</p>
  <a href="/" class="btn btn-pri" style="margin-top:1rem">← Go Home</a>
</div>
{% endblock %}
